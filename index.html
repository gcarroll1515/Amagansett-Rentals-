<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dune:    #f2e8d5;
    --sand:    #e8d9bb;
    --wheat:   #c9a96e;
    --ocean:   #1b5e7b;
    --seafoam: #4a9b8e;
    --sky:     #d4eaf5;
    --ink:     #1c2b2b;
    --bark:    #4a3728;
    --mist:    #7a8e8e;
    --white:   #ffffff;
    --rule:    #ddd4c4;
    --green:   #2d6a4f;
    --red:     #9b2335;
    --amber:   #b5522a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dune);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 0 44px;
    display: flex; align-items: stretch; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 24px rgba(0,0,0,.4);
  }
  .brand {
    padding: 20px 0 16px;
    border-right: 1px solid rgba(255,255,255,.08);
    padding-right: 32px;
    margin-right: 28px;
  }
  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.75rem; font-weight: 700; font-style: italic;
    color: var(--dune); line-height: 1; letter-spacing: .5px;
  }
  .brand p {
    font-size: .68rem; color: var(--wheat);
    letter-spacing: 3px; text-transform: uppercase;
    margin-top: 5px; font-weight: 500;
  }
  .header-right {
    display: flex; align-items: center; gap: 16px;
    padding: 0;
  }
  .family-pill {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 20px; padding: 6px 14px;
    font-size: .73rem; color: var(--sand); letter-spacing: .3px;
  }
  .note-pill {
    background: rgba(201,169,110,.12);
    border: 1px solid rgba(201,169,110,.25);
    border-radius: 20px; padding: 6px 14px;
    font-size: .73rem; color: var(--wheat); letter-spacing: .3px;
  }

  /* ── TABS ── */
  .tab-bar {
    background: var(--ink);
    display: flex; padding: 0 44px;
    border-top: 1px solid rgba(255,255,255,.06);
    overflow-x: auto; gap: 2px;
  }
  .tab-bar::-webkit-scrollbar { height: 2px; }
  .tab-bar::-webkit-scrollbar-thumb { background: var(--seafoam); }

  .tab-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: .75rem; font-weight: 500;
    color: rgba(255,255,255,.45);
    padding: 11px 16px 9px;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color .18s, border-color .18s;
    letter-spacing: .2px;
  }
  .tab-btn .tab-sub {
    display: block; font-size: .62rem;
    color: rgba(255,255,255,.25); margin-top: 1px;
  }
  .tab-btn.active { color: var(--dune); border-bottom-color: var(--seafoam); }
  .tab-btn.active .tab-sub { color: var(--seafoam); }
  .tab-btn:hover:not(.active) { color: rgba(255,255,255,.75); }
  .tab-btn.unavail-tab { opacity: .5; }

  /* ── PANELS ── */
  .panel { display: none; animation: fadeIn .25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  /* ── SUMMARY ── */
  .summary-wrap { padding: 32px 44px; max-width: 1120px; margin: 0 auto; }

  .hero-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
    margin-bottom: 30px;
  }
  .hero-card {
    background: var(--ink); border-radius: 12px;
    padding: 20px 22px; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    border: 1px solid rgba(255,255,255,.06);
  }
  .hero-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.2); }
  .hero-card .hc-label {
    font-size: .6rem; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--wheat); font-weight: 600; margin-bottom: 7px;
  }
  .hero-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 700; color: var(--dune); margin-bottom: 5px;
  }
  .hero-card p { font-size: .8rem; color: rgba(255,255,255,.55); line-height: 1.5; }
  .hero-card .hc-price {
    margin-top: 10px; font-size: .95rem; font-weight: 600;
    color: var(--seafoam);
  }
  .hero-card.unavail { opacity: .55; cursor: default; }
  .hero-card.unavail:hover { transform: none; box-shadow: none; }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem; font-weight: 700; color: var(--ink);
    margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--rule); }

  /* table */
  .comp-table {
    width: 100%; border-collapse: collapse;
    background: var(--white); border-radius: 12px;
    overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.06);
    margin-bottom: 30px; font-size: .8rem;
  }
  .comp-table thead th {
    background: var(--ink); color: var(--dune);
    padding: 10px 13px; text-align: left;
    font-weight: 600; font-size: .7rem;
    letter-spacing: .6px; text-transform: uppercase;
  }
  .comp-table tbody tr {
    border-bottom: 1px solid var(--rule);
    cursor: pointer; transition: background .12s;
  }
  .comp-table tbody tr:last-child { border-bottom: none; }
  .comp-table tbody tr:hover { background: var(--sky); }
  .comp-table tbody tr.unavail-row { opacity: .5; cursor: default; }
  .comp-table tbody tr.unavail-row:hover { background: none; }
  .comp-table td { padding: 9px 13px; vertical-align: middle; }
  .comp-table td.price { font-weight: 700; color: var(--green); }
  .comp-table td.unavail-price { color: var(--red); font-weight: 600; font-size:.75rem; }
  .pool-badge {
    display:inline-block; background:#1b5e7b; color:white;
    font-size:.62rem; font-weight:700; padding:2px 6px;
    border-radius:8px; margin-left:4px; vertical-align:middle;
  }
  .priv-badge {
    display:inline-block; background:var(--amber); color:white;
    font-size:.62rem; font-weight:700; padding:2px 6px;
    border-radius:8px; margin-left:4px; vertical-align:middle;
  }

  /* map */
  .map-container {
    width:100%; height:460px; border-radius:14px; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.12); background:var(--sky);
    margin-bottom:6px;
  }
  #map { width:100%; height:100%; }
  .map-note { font-size:.72rem; color:var(--mist); text-align:center; margin-bottom:28px; }

  /* ── PROPERTY PANEL ── */
  .prop-wrap { padding: 28px 44px; max-width: 1120px; margin: 0 auto; }

  .prop-header {
    background: var(--ink); border-radius: 14px 14px 0 0;
    padding: 22px 28px 18px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .prop-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem; font-weight: 700; color: var(--dune); font-style: italic;
  }
  .prop-header .prop-sub { color: var(--wheat); font-size: .8rem; margin-top: 3px; }
  .top-badge {
    background: var(--wheat); color: var(--ink);
    font-size: .65rem; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; padding: 5px 13px; border-radius: 20px;
    white-space: nowrap; margin-top: 4px;
  }
  .unavail-badge {
    background: var(--red); color: white;
    font-size: .65rem; font-weight: 700; letter-spacing: .8px;
    text-transform: uppercase; padding: 5px 13px; border-radius: 20px;
  }

  .prop-stats {
    background: var(--white);
    display: grid; grid-template-columns: repeat(6,1fr);
    border: 1px solid var(--rule);
    border-radius: 0 0 12px 12px; overflow: hidden;
    margin-bottom: 18px;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
  }
  .stat-cell {
    padding: 13px 8px; text-align: center;
    border-right: 1px solid var(--rule);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--ink);
  }
  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red); font-size: .9rem; }
  .stat-val.avail { font-size: .82rem; font-weight: 600; color: var(--green); }
  .stat-lbl {
    font-size: .62rem; color: var(--mist);
    letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
  }

  .access-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .access-pill {
    background: var(--sky); border: 1px solid #b8d8ea;
    border-radius: 8px; padding: 10px 16px; flex: 1;
    font-size: .8rem; color: var(--ink);
  }
  .access-pill strong {
    display: block; font-size: .63rem; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--ocean); margin-bottom: 3px;
  }

  .map-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--ocean); color: white;
    text-decoration: none; font-size: .76rem; font-weight: 600;
    padding: 8px 18px; border-radius: 8px;
    transition: background .18s; margin-bottom: 18px;
  }
  .map-link:hover { background: #154a5f; }

  .prop-body { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  .card {
    background: var(--white); border-radius: 10px;
    padding: 18px 20px; border: 1px solid var(--rule);
    box-shadow: 0 1px 8px rgba(0,0,0,.04);
  }
  .card h4 {
    font-size: .63rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--seafoam); font-weight: 700; margin-bottom: 10px;
    padding-bottom: 7px; border-bottom: 1px solid var(--rule);
  }
  .card ul { list-style: none; }
  .card ul li {
    font-size: .82rem; color: var(--ink); line-height: 1.5;
    padding: 4px 0 4px 16px; position: relative;
    border-bottom: 1px solid rgba(0,0,0,.04);
  }
  .card ul li:last-child { border-bottom: none; }
  .card ul li::before { content:'›'; position:absolute; left:0; color:var(--seafoam); font-weight:700; font-size:.95rem; }
  .card ul li.pro::before { content:'✓'; color:var(--green); font-size:.82rem; }
  .card ul li.con::before { content:'✕'; color:var(--red);   font-size:.82rem; }
  .card ul li.pro { color: var(--green); }
  .card ul li.con { color: var(--red); }

  .unavail-banner {
    background: rgba(155,35,53,.08); border: 1px solid rgba(155,35,53,.2);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 18px;
    font-size: .82rem; color: var(--red); font-weight: 500;
  }

  @media (max-width: 768px) {
    header { padding: 0 18px; flex-wrap: wrap; }
    .brand { padding: 14px 0 12px; }
    .tab-bar { padding: 0 18px; }
    .summary-wrap, .prop-wrap { padding: 20px 18px; }
    .hero-grid { grid-template-columns: 1fr; }
    .prop-stats { grid-template-columns: repeat(3,1fr); }
    .prop-body  { grid-template-columns: 1fr; }
    .access-row { flex-direction: column; }
    .comp-table { font-size: .73rem; }
    .comp-table td { padding: 7px 9px; }
  }
</style>
</head>

// ── Build UI ──────────────────────────────────────────────────────────────────
const tabBar = document.getElementById('tabBar');
const panels = document.getElementById('panels');

// Summary tab
const sumBtn = document.createElement('button');
sumBtn.className = 'tab-btn active';
sumBtn.dataset.panel = 'summary';
sumBtn.innerHTML = '<span>Overview &amp; Map</span>';
tabBar.appendChild(sumBtn);

PROPS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (!p.avail ? ' unavail-tab' : '');
  btn.dataset.panel = `prop-${p.num}`;
  btn.innerHTML = `<span>#${p.num} · ${p.shortName}</span><span class="tab-sub">${p.augPrice} Aug${!p.avail?' · Off Market':''}</span>`;
  tabBar.appendChild(btn);
});

// ── Summary panel ─────────────────────────────────────────────────────────────
const sumPanel = document.createElement('div');
sumPanel.id = 'summary';
sumPanel.className = 'panel active';

const BUDGET = 50;
const availProps = PROPS.filter(p => p.avail);
const withinBudget = availProps.filter(p => parseFloat(p.augPrice.replace(/[^0-9.]/g,'')) <= BUDGET);
const overBudget   = availProps.filter(p => parseFloat(p.augPrice.replace(/[^0-9.]/g,'')) > BUDGET);

// Hero cards = top 3 within-budget available props
const heroCards = withinBudget.slice(0,3).map(p => `
  <div class="hero-card" onclick="switchTo('prop-${p.num}')">
    <div class="hc-label">✓ Within Budget — ${p.neighborhood}</div>
    <h3>#${p.num} · ${p.name}</h3>
    <p>${p.beds}BD · ${p.baths}BA · ${p.sqft ? p.sqft.toLocaleString()+' SF' : ''} · ${p.acres} AC${p.pool?' · Pool':''}</p>
    <div class="hc-price">${p.augPrice} ${p.augLabel}</div>
  </div>`).join('');

// Over-budget callout names
const overNames = overBudget.map(p => `#${p.num} ${p.name} (${p.augPrice})`).join(', ');

sumPanel.innerHTML = `
<div class="summary-wrap">
  <div style="background:rgba(181,82,42,.08);border:1px solid rgba(181,82,42,.2);border-radius:10px;padding:12px 18px;margin-bottom:10px;font-size:.82rem;color:var(--amber);">
    <strong>Note:</strong> All 8 Amagansett properties are 4 bedrooms. For a group of 7, prioritize bathroom count and square footage. Listing #8 is Off Market for August.
  </div>
  <div style="background:rgba(155,35,53,.07);border:1px solid rgba(155,35,53,.22);border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:.82rem;color:var(--red);">
    <strong>💰 Budget: ≤$50K.</strong> Over-budget listings are greyed out: <strong>${overNames}</strong>. Within-budget options: <strong>${withinBudget.map(p=>'#'+p.num+' '+p.name).join(', ')}</strong>.
  </div>

  <div class="hero-grid">${heroCards}</div>

  <div class="section-title">All 8 Properties at a Glance</div>
  <table class="comp-table" id="compTable">
    <thead>
      <tr>
        <th>#</th><th>Address</th><th>BD</th><th>BA</th><th>SqFt</th><th>Lot</th>
        <th>Pool</th><th>Aug Price</th><th>Label</th><th>Beach Access</th>
      </tr>
    </thead>
    <tbody id="compTbody"></tbody>
  </table>

  <div class="section-title">Property Locations</div>
  <div class="map-container"><div id="map"></div></div>
  <p class="map-note">Click any pin · Orange = top pick · Blue = pool · Green = no pool · Red = off market / over budget</p>
</div>`;
panels.appendChild(sumPanel);

// Fill table
const tbody = document.getElementById('compTbody');
PROPS.forEach(p => {
  const price = parseFloat(p.augPrice.replace(/[^0-9.]/g,''));
  const isOver = p.avail && price > BUDGET;
  const tr = document.createElement('tr');
  if (!p.avail || isOver) tr.classList.add('unavail-row');
  tr.innerHTML = `
    <td><strong>${p.num}</strong></td>
    <td>${p.name}${p.pool?'<span class="pool-badge">Pool</span>':''}${p.private?'<span class="priv-badge">Private</span>':''}</td>
    <td>${p.beds}</td><td>${p.baths}</td>
    <td>${p.sqft ? p.sqft.toLocaleString() : '—'}</td>
    <td>${p.acres} AC</td>
    <td>${p.pool ? '✓' : '—'}</td>
    <td class="${!p.avail ? 'unavail-price' : isOver ? 'unavail-price' : 'price'}">${!p.avail ? 'Off Market' : isOver ? p.augPrice+' ⚠ Over budget' : p.augPrice}</td>
    <td style="font-size:.73rem">${p.augLabel}</td>
    <td style="font-size:.73rem">${p.toBeach}</td>`;
  if (p.avail && !isOver) tr.addEventListener('click', () => switchTo(`prop-${p.num}`));
  tbody.appendChild(tr);
});

// ── Property panels ───────────────────────────────────────────────────────────
PROPS.forEach(p => {
  const div = document.createElement('div');
  div.id = `prop-${p.num}`;
  div.className = 'panel';
  const mapQ = encodeURIComponent(p.address);

  const priceNum = parseFloat(p.augPrice.replace(/[^0-9.]/g,''));
  const isOverBudget = p.avail && priceNum > BUDGET;
  const unavailBanner = !p.avail ? `
    <div class="unavail-banner">
      ⚠ This property is currently <strong>Off Market</strong> for August 2026. It may be available for July ($40K) — confirm with the agent.
    </div>` : isOverBudget ? `
    <div class="unavail-banner" style="background:rgba(155,35,53,.08);border:1px solid rgba(155,35,53,.2)">
      💰 This listing (<strong>${p.augPrice}</strong>) exceeds your $50K budget. Included for reference only.
    </div>` : '';

  div.innerHTML = `
  <div class="prop-wrap">
    <div class="prop-header">
      <div>
        <h2>#${p.num} · ${p.name}</h2>
        <p class="prop-sub">${p.address} · ${p.neighborhood}${p.pool?' · Pool':''}</p>
      </div>
      ${p.top && p.avail && priceNum <= BUDGET ? '<div class="top-badge">★ Top Pick</div>' : ''}
      ${!p.avail ? '<div class="unavail-badge">Off Market</div>' : isOverBudget ? '<div class="unavail-badge" style="background:var(--amber)">Over Budget</div>' : ''}
    </div>

    <div class="prop-stats">
      <div class="stat-cell"><div class="stat-val">${p.beds}</div><div class="stat-lbl">Bedrooms</div></div>
      <div class="stat-cell"><div class="stat-val">${p.baths}</div><div class="stat-lbl">Bathrooms</div></div>
      <div class="stat-cell"><div class="stat-val">${p.sqft ? p.sqft.toLocaleString() : 'N/A'}</div><div class="stat-lbl">Sq Ft</div></div>
      <div class="stat-cell"><div class="stat-val">${p.acres} AC</div><div class="stat-lbl">Lot</div></div>
      <div class="stat-cell"><div class="stat-val ${p.avail ? 'green' : 'red'}">${p.avail ? p.augPrice : 'Off Mkt'}</div><div class="stat-lbl">${p.augLabel}</div></div>
      <div class="stat-cell"><div class="stat-val ${p.avail ? 'avail' : 'red'}">${p.avail ? '● Available' : '✕ Off Market'}</div><div class="stat-lbl">${p.avail ? p.augDates : 'Aug Unavail'}</div></div>
    </div>

    ${unavailBanner}

    <div class="access-row">
      <div class="access-pill"><strong>Downtown</strong>${p.toDowntown}</div>
      <div class="access-pill"><strong>Nearest Beach</strong>${p.toBeach}</div>
      ${p.julPrice ? `<div class="access-pill"><strong>July Option</strong>${p.julPrice} (${p.julLabel})</div>` : ''}
    </div>

    <a class="map-link" href="https://maps.google.com/maps?q=${mapQ}" target="_blank">📍 View on Google Maps</a>

    <div class="prop-body">
      <div>
        <div class="card" style="margin-bottom:16px">
          <h4>Interior Highlights</h4>
          <ul>${p.interior.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="card">
          <h4>Exterior &amp; Outdoor</h4>
          <ul>${p.exterior.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:16px">
          <h4>Nearby Points of Interest</h4>
          <ul>${p.pois.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="card">
          <h4>Pros &amp; Cons</h4>
          <ul>
            ${p.pros.map(i=>`<li class="pro">${i}</li>`).join('')}
            ${p.cons.map(i=>`<li class="con">${i}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>
  </div>`;
  panels.appendChild(div);
});

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTo(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`[data-panel="${id}"]`);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  const panel = document.getElementById(id);
  if (panel) panel.classList.add('active');
  if (id === 'summary') initMap();
}
tabBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTo(btn.dataset.panel);
});

// ── Map ───────────────────────────────────────────────────────────────────────
let mapInit = false;
function initMap() {
  if (mapInit) return;
  mapInit = true;
  const map = L.map('map').setView([40.9735, -72.1265], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(map);

  PROPS.forEach(p => {
    const priceN = parseFloat(p.augPrice.replace(/[^0-9.]/g,''));
    const isOB = p.avail && priceN > BUDGET;
    const color = (!p.avail || isOB) ? '#9b2335' : p.top ? '#b5522a' : p.pool ? '#1b5e7b' : '#2d6a4f';
    const icon = L.divIcon({
      className:'',
      html:`<div style="background:${color};color:white;width:30px;height:30px;
        border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,.35);border:2px solid white;
        font-family:'Inter',sans-serif;">
        <span style="transform:rotate(45deg);font-size:11px;font-weight:700">${p.num}</span>
      </div>`,
      iconSize:[30,30], iconAnchor:[15,30],
    });
    const marker = L.marker([p.lat, p.lng], {icon}).addTo(map);
    marker.bindPopup(`
      <div style="font-family:'Inter',sans-serif;min-width:190px">
        <div style="font-weight:700;font-size:.88rem;color:#1c2b2b;margin-bottom:3px">#${p.num} · ${p.name}</div>
        <div style="font-size:.74rem;color:#7a8e8e;margin-bottom:6px">${p.neighborhood}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          <span style="background:${p.avail?'#e8f5e9':'#fce4ec'};color:${p.avail?'#2d6a4f':'#9b2335'};padding:2px 8px;border-radius:8px;font-size:.72rem;font-weight:600">${p.avail?p.augPrice+' Aug':'Off Market'}</span>
          <span style="background:#d4eaf5;color:#1b5e7b;padding:2px 8px;border-radius:8px;font-size:.72rem">${p.beds}BD/${p.baths}BA${p.pool?' · Pool':''}</span>
        </div>
        <div style="font-size:.73rem;color:#4a3728;margin-bottom:5px">🏖️ ${p.toBeach}</div>
        ${p.avail ? `<a href="#" onclick="event.preventDefault();document.querySelector('[data-panel=\\'prop-${p.num}\\']').click()"
          style="font-size:.72rem;color:#4a9b8e;font-weight:600;text-decoration:none">View details →</a>` : '<span style="font-size:.72rem;color:#9b2335">Not available August</span>'}
      </div>`, {maxWidth:220});
  });

  const legend = L.control({position:'bottomright'});
  legend.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText='background:white;padding:10px 14px;border-radius:8px;font-family:"Inter",sans-serif;font-size:.72rem;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    d.innerHTML=`<div style="font-weight:700;margin-bottom:6px;color:#1c2b2b">Legend</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:11px;height:11px;background:#b5522a;border-radius:50%;display:inline-block"></span> Top Pick</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:11px;height:11px;background:#1b5e7b;border-radius:50%;display:inline-block"></span> Pool (available)</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:11px;height:11px;background:#2d6a4f;border-radius:50%;display:inline-block"></span> No pool (available)</div>
      <div style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;background:#9b2335;border-radius:50%;display:inline-block"></span> Off Market</div>`;
    return d;
  };
  legend.addTo(map);
}
setTimeout(initMap, 100);
</script>
